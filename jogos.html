<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogos &amp; Palpites · Bolão CDM</title>
  <link rel="icon" type="image/png" href="assets/img/logo-cdm.png" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/jogos.css" />
  <script src="assets/js/theme.js"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <img class="brand__logo" src="assets/img/logo-cdm.png" alt="Logo do Bolão CDM" />
      <span class="brand__text">Bolão <strong>CDM</strong></span>
    </a>
    <nav class="topnav" aria-label="Navegação principal">
      <a class="topnav__link" href="index.html">Início</a>
      <a class="topnav__link is-active" href="jogos.html">Jogos</a>
      <a class="topnav__link" href="ranking.html">Ranking</a>
      <a class="topnav__link" href="participante.html">Meus palpites</a>
      <a class="topnav__link" href="regras.html">Regras</a>
    </nav>
    <button id="profileChip" class="profile-chip" type="button" title="Editar seu nome"></button>
  </header>

  <main class="page">
    <div class="page__head">
      <h1 class="page__title">Jogos &amp; Palpites</h1>
      <p class="page__sub">
        Palpite no placar de cada jogo — horários de Brasília. O palpite trava
        automaticamente quando a bola rola.
      </p>
    </div>

    <section id="bonusRoot" class="bonus"></section>

    <div id="phaseFilter" class="filterbar" role="tablist" aria-label="Filtrar por fase">
      <button class="is-active" data-filter="all">Todos</button>
      <button data-filter="group">Grupos</button>
      <button data-filter="r32">32 avos</button>
      <button data-filter="r16">Oitavas</button>
      <button data-filter="qf">Quartas</button>
      <button data-filter="sf">Semis</button>
      <button data-filter="third">3º lugar</button>
      <button data-filter="final">Final</button>
    </div>

    <div id="matchesRoot"></div>
  </main>

  <!-- Dados (variáveis globais) primeiro, depois a lógica -->
  <script src="data/teams.js"></script>
  <script src="data/matches.js"></script>
  <script src="data/scorers.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/db.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/countdown.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/jogos.js"></script>
  <footer class="footer">
    <p>⚽ Bolão CDM · Copa 2026 ⚽</p>
  </footer>
</body>
</html>
